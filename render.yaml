services:
  - type: web
    name: vidyasetu-backend
    env: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: vidyasetu-db
          property: connectionString
      - key: PORT
        value: 3001

  - type: web
    name: vidyasetu-ai-service
    env: python
    rootDir: ai-service
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0

databases:
  - name: vidyasetu-db
    databaseName: vidyasetu
    user: render_user
